name: nuget-prerelease

# Reusable workflow: publish prerelease packages to GitHub Packages.
# Intended to be called on pushes to the `rc` branch. Produces
# {Version}-rc.{commit count} for every project under the `# packages`
# section of the caller's .projects file.
on:
  workflow_call:
    inputs:
      dotnet-version:
        description: .NET SDK version to set up
        type: string
        required: false
        default: '10.0.x'

permissions:
  contents: read
  packages: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    concurrency:
      group: prerelease-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so `git rev-list --count` is accurate

      - name: Determine version
        id: version
        run: |
          base=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          # The base must be a clean release version (e.g. 1.2.3) — the workflow appends
          # `-rc.{count}` to form the prerelease. A base that already carries a prerelease
          # tag or build metadata (e.g. 1.2.3-rc.5, 1.2.3+abc) silently produces a wrong
          # package version once NuGet normalizes it, so reject it here.
          if ! [[ "$base" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::<Version> in Directory.Build.props must be a clean release version like 1.2.3 (no prerelease tag or build metadata); found '${base}'"
            exit 1
          fi
          # Block candidates for a version that has already been released.
          # Exact match only: v1.0.0 existing blocks 1.0.0-rc.N, but an unrelated
          # higher release (e.g. v1.0.1) does not block 1.0.0-rc.N.
          if git rev-parse -q --verify "refs/tags/v${base}" >/dev/null; then
            echo "::error::v${base} is already released — bump <Version> in Directory.Build.props before publishing new candidates"
            exit 1
          fi
          count=$(git rev-list --count HEAD)
          version="${base}-rc.${count}"
          echo "Prerelease version: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build, test, and pack
        uses: RushuiGuan/devops/.github/actions/build-pack@v1
        with:
          version: ${{ steps.version.outputs.version }}
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Push to GitHub Packages
        run: |
          for pkg in out/*.nupkg; do
            dotnet nuget push "$pkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
          done
