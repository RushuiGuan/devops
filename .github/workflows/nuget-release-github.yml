name: nuget-release-github

# Reusable workflow: publish a stable release to GitHub Packages.
# Intended to be called on a `vX.Y.Z` tag push. Publishes the clean
# {Version} for every project under the `# packages` section of the
# caller's .projects file, guarded by two checks.
on:
  workflow_call:
    inputs:
      dotnet-version:
        description: .NET SDK version to set up
        type: string
        required: false
        default: '10.0.x'

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history + branches for the production ancestor check

      - name: Validate release tag
        id: guards
        uses: RushuiGuan/devops/.github/actions/release-guards@v1

      - name: Build, test, and pack
        uses: RushuiGuan/devops/.github/actions/build-pack@v1
        with:
          version: ${{ steps.guards.outputs.version }}
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Push to GitHub Packages
        run: |
          for pkg in out/*.nupkg; do
            dotnet nuget push "$pkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
          done
