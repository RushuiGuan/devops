name: docfx

# Reusable workflow: build a docfx site from the caller's repo and deploy it to
# GitHub Pages. The caller's repo is checked out, so docfx_project comes from there.
# The caller must grant: actions: read, pages: write, id-token: write.
on:
  workflow_call:
    inputs:
      dotnet-version:
        description: .NET SDK version to set up
        type: string
        required: false
        default: '8.x'
      docfx-config:
        description: Path to the docfx config file
        type: string
        required: false
        default: 'docfx_project/docfx.json'
      site-path:
        description: Path to the generated site to publish
        type: string
        required: false
        default: 'docfx_project/_site'

permissions:
  actions: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  publish-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Dotnet Setup
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - run: dotnet tool update -g docfx
    - run: docfx ${{ inputs.docfx-config }}

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ${{ inputs.site-path }}
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
