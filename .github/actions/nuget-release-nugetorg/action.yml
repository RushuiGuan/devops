name: nuget-release-nugetorg
description: Test, pack, and publish a stable release to nuget.org via Trusted Publishing (OIDC), then create a GitHub Release.

# Composite action: all steps run in the CALLER's job, so the OIDC job_workflow_ref
# claim is the caller's workflow - which is what nuget.org's Trusted Publishing policy
# must match (Repository: <caller>, Workflow: <caller workflow file>). Running NuGet/login
# and the push in the same job also avoids the masked-output redaction that breaks the
# reusable-workflow approach.
#
# The calling job must grant: contents: write (GitHub Release), packages: read, id-token: write.

inputs:
  nuget-user:
    description: nuget.org profile name that owns the Trusted Publishing policy
    required: true
  dotnet-version:
    description: .NET SDK version to set up
    required: false
    default: '10.0.x'

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0   # need history + branches for the production ancestor check

    - name: Validate release tag
      id: guards
      uses: RushuiGuan/devops/.github/actions/release-guards@v1

    - name: Build, test, and pack
      uses: RushuiGuan/devops/.github/actions/build-pack@v1
      with:
        version: ${{ steps.guards.outputs.version }}
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: NuGet login (OIDC -> short-lived API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: ${{ inputs.nuget-user }}

    - name: Push to nuget.org
      shell: bash
      run: |
        # login and push are in the same job, so the masked key stays usable here.
        # Pushing a .nupkg also pushes its co-located .snupkg symbols to nuget.org.
        for pkg in out/*.nupkg; do
          dotnet nuget push "$pkg" --source "https://api.nuget.org/v3/index.json" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --skip-duplicate
        done

    - name: Create GitHub Release
      shell: bash
      # Requires contents: write on the calling job. Idempotent across re-runs.
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
          echo "Release $GITHUB_REF_NAME already exists; skipping."
        else
          gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        fi
